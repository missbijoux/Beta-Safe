name: Build PyInstaller artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: PyInstaller (onedir / .app)
        run: pyinstaller -y --clean packaging/pyinstaller/betasafe.spec

      - name: Upload Windows onedir
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: betasafe-windows-onedir
          path: dist/BetaSafe/

      - name: Upload macOS .app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: betasafe-macos-app
          path: dist/BetaSafe.app
